<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy-Driven Society Sim - Phase 0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="fixed-header">
      <div class="header-top-row">
        <h1>Policy-Driven Society Simulation</h1>
        <div class="header-actions">
          <button id="save-btn" type="button">💾 Save</button>
          <button id="load-btn" type="button">📂 Load</button>
          <button id="export-btn" type="button">📤 Export</button>
          <label for="import-input" class="btn-like">📥 Import</label>
          <input id="import-input" type="file" accept="application/json" hidden />
          <button id="reset-btn" type="button">🔄 Reset</button>
          <span id="autosave-indicator" class="muted" aria-live="polite"></span>
          <button id="next-year-btn" class="primary">Next Year</button>
        </div>
      </div>
      <div id="header-stats" class="header-stats"></div>
    </header>

    <main class="tab-content-area">
      <section class="tab-view active" data-tab-content="overview">
        <section class="panel" id="core-stats-panel">
          <h2>Core Stats</h2>
          <div id="core-stats"></div>
        </section>

        <section class="panel" id="policies-panel">
          <h2>Available Policies</h2>
          <div id="policy-list"></div>
        </section>

        <section class="panel" id="year-log-panel">
          <h2>Year Log</h2>
          <ul id="year-log"></ul>
        </section>
      </section>

      <section class="tab-view" data-tab-content="economy">
        <div id="economy-tab-content"></div>
      </section>

      <section class="tab-view" data-tab-content="agriculture">
        <div id="agriculture-tab-content"></div>
      </section>

      <section class="tab-view" data-tab-content="buildings">
        <div id="buildings-tab-content"></div>
      </section>

      <section class="tab-view" data-tab-content="society">
        <div id="society-tab-content"></div>
      </section>

      <section class="tab-view" data-tab-content="map">
        <div id="map-tab-content"></div>
      </section>

      <section class="tab-view" data-tab-content="technology">
        <section class="panel" id="tech-tree-panel">
          <h2>Technology Tree</h2>
          <div id="tech-tree-content"></div>
        </section>
      </section>

      <section class="tab-view" data-tab-content="currency">
        <section class="panel" id="systems-panel">
          <h2>Unlocked Systems</h2>
          <ul id="systems-list"></ul>

          <div id="grain-coupon-panel" class="subpanel hidden">
            <h3>Grain Coupon System</h3>
            <div id="grain-coupon-stats"></div>
            <div class="coupon-controls">
              <label for="coupon-issue-input">Issue amount:</label>
              <input id="coupon-issue-input" type="number" min="1" step="1" value="1000" />
              <button id="issue-coupon-btn">Issue Grain Coupons</button>
            </div>
          </div>

          <p id="grain-coupon-locked" class="muted">
            Grain coupon system is locked. Complete the bank policy chain to unlock.
          </p>
        </section>
        <div id="currency-tab-content"></div>
      </section>
    </main>

    <nav class="tab-nav" aria-label="Main Tabs">
      <button class="tab-btn active" data-tab="overview">总览</button>
      <button class="tab-btn" data-tab="economy">经济</button>
      <button class="tab-btn" data-tab="agriculture">农业</button>
      <button class="tab-btn" data-tab="buildings">建筑</button>
      <button class="tab-btn" data-tab="society">社会</button>
      <button class="tab-btn" data-tab="map">地图</button>
      <button class="tab-btn" data-tab="technology">科技</button>
      <button class="tab-btn" data-tab="currency">货币</button>
    </nav>
  </div>

  <script type="module" src="js/config/constants.js"></script>
  <script type="module" src="js/state.js"></script>
  <script type="module" src="js/economy/transfer.js"></script>
  <script type="module" src="js/economy/labor.js"></script>
  <script type="module" src="js/economy/agriculture.js"></script>
  <script type="module" src="js/economy/commerce.js"></script>
  <script type="module" src="js/economy/market.js"></script>
  <script type="module" src="js/economy/currency.js"></script>
  <script type="module" src="js/society/population.js"></script>
  <script type="module" src="js/society/stability.js"></script>
  <script type="module" src="js/society/satisfaction.js"></script>
  <script type="module" src="js/society/interestGroups.js"></script>
  <script type="module" src="js/diplomacy/xikou.js"></script>
  <script type="module" src="js/tech/research.js"></script>
  <script type="module" src="js/buildings/buildingTypes.js"></script>
  <script type="module" src="js/buildings/productionMethods.js"></script>
  <script type="module" src="js/buildings/buildingEngine.js"></script>
  <script type="module" src="js/ui/render_world.js"></script>
  <script type="module" src="js/ui/render_economy.js"></script>
  <script type="module" src="js/ui/render_society.js"></script>
  <script type="module" src="js/ui/render_diplomacy.js"></script>
  <script type="module" src="js/ui/render_map.js"></script>
  <script type="module" src="js/ui/render_tech.js"></script>
  <script type="module" src="js/ui/render_buildings.js"></script>
  <script type="module" src="js/save.js"></script>
  <script type="module" src="js/render.js"></script>
  <script type="module" src="js/policies.js"></script>
  <script type="module" src="js/unlocks.js"></script>
  <script type="module" src="js/game.js"></script>
</body>
</html>
